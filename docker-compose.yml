services:
  postgres:
    image: postgres:16-alpine
    container_name: gmn_flower_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: gmn_user
      POSTGRES_PASSWORD: gmn_password
      POSTGRES_DB: gmn_flower_store
    ports:
      - '5434:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U gmn_user -d gmn_flower_store']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gmn_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmnflower.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - '5050:80'
    depends_on:
      - postgres

volumes:
  postgres_data:
