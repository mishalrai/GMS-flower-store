      <stop offset="0%" stop-color="#86bf6c"/>
      <stop offset="100%" stop-color="#3a6b25"/>
    </linearGradient>
    <pattern id="leaves" x="0" y="0" width="160" height="160" patternUnits="userSpaceOnUse">
      <path d="M40 110 C 40 70, 80 40, 120 40 C 100 80, 80 100, 40 110 Z" fill="#ffffff" opacity="0.06"/>
      <path d="M120 130 C 120 100, 140 70, 160 70 C 150 100, 140 120, 120 130 Z" fill="#ffffff" opacity="0.05"/>
