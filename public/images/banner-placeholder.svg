  </defs>
  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#leaves)"/>
  <g font-family="system-ui, sans-serif" text-anchor="middle" fill="#ffffff" opacity="0.5">
    <text x="800" y="290" font-size="42" font-weight="600">Banner image placeholder</text>
